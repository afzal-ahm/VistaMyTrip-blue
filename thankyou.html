<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Vista My Trip</title>
<meta name="description" content="Thank you for contacting Vista My Trip. We will get back to you shortly.">
<link rel="icon" href="/img/VMT_logo_High_res_2.3_page-0001-removebg-preview.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
<style>
  .thank-you-hero {
    background: linear-gradient(135deg, var(--navy-dark), var(--navy));
    padding: 120px 24px;
    text-align: center;
    position: relative;
    overflow: hidden;
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .thank-you-hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url('/img/destination/goa.jfif') center/cover;
    opacity: 0.1;
  }
  .thank-you-inner {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
  }
  .thank-you-icon {
    font-size: 52px;
    color: var(--gold);
    margin-bottom: 20px;
    display: inline-block;
    padding: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
    width: 90px;
    height: 90px;
    line-height: 50px;
  }
  .thank-you-hero h1 {
    font-family: var(--fd);
    font-size: clamp(30px, 5vw, 50px);
    font-weight: 700;
    color: white;
    margin-bottom: 14px;
  }
  .thank-you-hero p {
    font-size: 16px;
    color: rgba(255, 255, 255, .8);
    line-height: 1.7;
    margin-bottom: 30px;
  }
</style>
</head>
<body>

<!-- ANNOUNCE -->
<div class="announce">
  📞 <strong>Response Guarantee:</strong> We reply to every enquiry within 2 business hours &nbsp;·&nbsp;
  <a href="https://wa.me/919220161414" target="_blank">WhatsApp Now →</a>
</div>

<!-- NAVBAR -->
<nav class="site-nav" id="navbar-placeholder"></nav>
<div class="mob-drawer" id="mobDrawer" role="dialog" aria-modal="true"></div>

<!-- HERO -->
<div class="thank-you-hero">
  <div class="thank-you-inner">
    <div class="thank-you-icon"><i class="fa-solid fa-check"></i></div>
    <h1>Thank You!</h1>
    <p>Your submission has been received. Our travel experts will get in touch with you within the next 2 business hours with a personalised response.</p>
    <div class="cta-btns">
        <a href="/" class="cta-gold"><i class="fa-solid fa-house"></i> Back to Home</a>
        <a href="holiday-package.html" class="cta-wh"><i class="fa-solid fa-suitcase"></i> Explore More Packages</a>
    </div>
  </div>
</div>

<!-- FOOTER -->
<div id="footer-placeholder"></div>

<script src="components.js"></script>
<script src="main.js"></script>
</body>
</html>
