<head>

<link rel="icon" href="/img/VMT_logo_High_res_2.3_page-0001-removebg-preview.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="/style.css">
<style>
  .error-hero {
    background: linear-gradient(135deg, var(--navy-dark) 0%, var(--navy) 60%, var(--navy-mid) 100%);
    min-height: 75vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    overflow: hidden;
    padding: 80px 24px;
  }
  .error-hero::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, var(--gold), var(--gold-dark), var(--gold));
  }
  .error-hero-bg {
    position: absolute; inset: 0; opacity: 0.1;
    background: url('https://images.unsplash.com/photo-1434082033009-b81d41d32e08?w=1600&q=60') center/cover;
  }
  .error-hero-inner {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
  }
  .error-code {
    font-family: var(--fd);
    font-size: clamp(80px, 12vw, 150px);
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 10px;
    text-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .error-hero h1 {
    font-family: var(--fd);
    font-size: clamp(24px, 4vw, 36px);
    color: white;
    margin-bottom: 16px;
  }
  .error-hero p {
    font-size: 16px;
    color: rgba(255,255,255,.75);
    line-height: 1.7;
    margin-bottom: 34px;
  }
  .error-acts {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }
</style>
</head>
<body>

  <div class="error-hero-bg"></div>
  <div class="error-hero-inner">

    <h1>Oops! Page Not Found</h1>
